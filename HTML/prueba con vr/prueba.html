<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mi Espacio VR</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
    background: #111;
    font-family: system-ui, sans-serif;
  }
  #info {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    text-align: center;
    color: #fff;
    padding: 14px;
    z-index: 5;
    pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
  #VRButton {
    position: absolute !important;
  }
</style>
</head>
<body>

<div id="info">Ponte el visor y pulsa "ENTER VR" para entrar en tu espacio virtual 🚀<br/>Usa la palanca del mando izquierdo para moverte</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

let scene, camera, renderer, dolly, clock;
let controller1, controller2, controllerGrip1, controllerGrip2;
let controllerModelFactory;

// Objetos que se pueden agarrar (de momento la sala está vacía)
const grabbables = [];

// Referencia: qué objeto está agarrando cada controlador ahora mismo
const grabbedByController = new Map();

// Velocidad de desplazamiento (metros por segundo)
const MOVE_SPEED = 2.2;
// Evita reaccionar a ruido del stick cuando está casi en el centro
const DEADZONE = 0.15;

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1b1f2a);
  scene.fog = new THREE.Fog(0x1b1f2a, 8, 25);

  camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth / window.innerHeight,
    0.05,
    50
  );

  // El "dolly" es el grupo que realmente movemos por el suelo.
  // La cámara va dentro, y WebXR mueve la cámara respecto al dolly
  // según la posición real de tu cabeza.
  dolly = new THREE.Group();
  dolly.position.set(0, 0, 3);
  dolly.add(camera);
  scene.add(dolly);

  clock = new THREE.Clock();

  // Luces
  const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444455, 1.2);
  scene.add(hemiLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(3, 6, 2);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(1024, 1024);
  dirLight.shadow.camera.left = -6;
  dirLight.shadow.camera.right = 6;
  dirLight.shadow.camera.top = 6;
  dirLight.shadow.camera.bottom = -6;
  scene.add(dirLight);

  // Suelo
  const floorGeo = new THREE.PlaneGeometry(12, 12);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x2e3444, roughness: 0.9 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Rejilla de referencia en el suelo
  const grid = new THREE.GridHelper(12, 24, 0x556080, 0x333a4a);
  scene.add(grid);

  // Paredes simples (para dar sensación de "sala")
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x22273a, roughness: 1, side: THREE.DoubleSide });
  const wallGeo = new THREE.PlaneGeometry(12, 4);

  const wallBack = new THREE.Mesh(wallGeo, wallMat);
  wallBack.position.set(0, 2, -6);
  scene.add(wallBack);

  const wallLeft = new THREE.Mesh(wallGeo, wallMat);
  wallLeft.position.set(-6, 2, 0);
  wallLeft.rotation.y = Math.PI / 2;
  scene.add(wallLeft);

  const wallRight = new THREE.Mesh(wallGeo, wallMat);
  wallRight.position.set(6, 2, 0);
  wallRight.rotation.y = -Math.PI / 2;
  scene.add(wallRight);

  // Sala vacía por ahora: sin mesa ni objetos.
  // Más adelante podemos volver a añadir cosas agarrables aquí.

  // Renderer con WebXR activado
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  // Botón oficial de Three.js para entrar/salir de VR
  document.body.appendChild(VRButton.createButton(renderer));

  // --- Controladores ---
  controllerModelFactory = new XRControllerModelFactory();

  // Rayo visual que sale de cada controlador (ayuda a apuntar)
  const rayGeometry = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(0, 0, -1),
  ]);

  function buildController() {
    const line = new THREE.Line(rayGeometry, new THREE.LineBasicMaterial({ color: 0xffffff }));
    line.scale.z = 0.3;
    line.name = 'ray';
    return line;
  }

  // Importante: los controladores se añaden al DOLLY, no directamente a la
  // escena, para que al mover el dolly (locomoción) las manos se muevan
  // junto con el jugador y no se queden "flotando" en el sitio original.
  controller1 = renderer.xr.getController(0);
  controller1.add(buildController());
  controller1.userData.handedness = 'controller1';
  dolly.add(controller1);

  controller2 = renderer.xr.getController(1);
  controller2.add(buildController());
  controller2.userData.handedness = 'controller2';
  dolly.add(controller2);

  controller1.addEventListener('selectstart', () => onSelectStart(controller1));
  controller1.addEventListener('selectend', () => onSelectEnd(controller1));
  controller2.addEventListener('selectstart', () => onSelectStart(controller2));
  controller2.addEventListener('selectend', () => onSelectEnd(controller2));

  // Nos guardamos qué mano (izquierda/derecha) es cada controlador en
  // cuanto WebXR nos lo confirma, para saber cuál usar para movernos.
  controller1.addEventListener('connected', (e) => {
    controller1.userData.inputSource = e.data;
  });
  controller1.addEventListener('disconnected', () => {
    controller1.userData.inputSource = null;
  });
  controller2.addEventListener('connected', (e) => {
    controller2.userData.inputSource = e.data;
  });
  controller2.addEventListener('disconnected', () => {
    controller2.userData.inputSource = null;
  });

  controllerGrip1 = renderer.xr.getControllerGrip(0);
  controllerGrip1.add(controllerModelFactory.createControllerModel(controllerGrip1));
  dolly.add(controllerGrip1);

  controllerGrip2 = renderer.xr.getControllerGrip(1);
  controllerGrip2.add(controllerModelFactory.createControllerModel(controllerGrip2));
  dolly.add(controllerGrip2);

  window.addEventListener('resize', onWindowResize);
}

// Busca el gamepad del mando IZQUIERDO entre los dos controladores
function getLeftGamepad() {
  const candidates = [controller1, controller2];
  for (const c of candidates) {
    const src = c.userData.inputSource;
    if (src && src.handedness === 'left' && src.gamepad) {
      return src.gamepad;
    }
  }
  return null;
}

// Mueve al jugador (el dolly) según la palanca izquierda, en la
// dirección hacia donde está mirando (locomoción tipo "smooth")
function handleLocomotion(delta) {
  const gamepad = getLeftGamepad();
  if (!gamepad || !gamepad.axes || gamepad.axes.length < 4) return;

  // En mandos Touch de Quest, axes[2] y axes[3] son el eje X/Y del stick
  let x = gamepad.axes[2];
  let y = gamepad.axes[3];

  if (Math.abs(x) < DEADZONE) x = 0;
  if (Math.abs(y) < DEADZONE) y = 0;
  if (x === 0 && y === 0) return;

  // Dirección hacia donde mira la cámara, proyectada sobre el suelo
  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.y = 0;
  forward.normalize();

  const right = new THREE.Vector3();
  right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).negate();

  const moveDist = MOVE_SPEED * delta;

  // y del stick: arriba = -1 (avanzar), abajo = 1 (retroceder)
  dolly.position.addScaledVector(forward, -y * moveDist);
  dolly.position.addScaledVector(right, x * moveDist);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// Busca el objeto agarrable más cercano a un controlador (dentro de un radio)
function findClosestGrabbable(controller) {
  const controllerPos = new THREE.Vector3();
  controller.getWorldPosition(controllerPos);

  let closest = null;
  let closestDist = 0.18; // radio de "agarre" en metros

  grabbables.forEach(obj => {
    if (obj.userData.grabbedBy) return; // ya está siendo agarrado por otro controlador
    const objPos = new THREE.Vector3();
    obj.getWorldPosition(objPos);
    const dist = controllerPos.distanceTo(objPos);
    if (dist < closestDist) {
      closestDist = dist;
      closest = obj;
    }
  });

  return closest;
}

function onSelectStart(controller) {
  const obj = findClosestGrabbable(controller);
  if (obj) {
    // Reparent temporalmente el objeto al controlador para que siga su movimiento
    controller.attach(obj);
    obj.userData.grabbedBy = controller;
    grabbedByController.set(controller, obj);

    // pequeño feedback visual: escala ligera al agarrar
    obj.scale.multiplyScalar(1.1);
  }
}

function onSelectEnd(controller) {
  const obj = grabbedByController.get(controller);
  if (obj) {
    // Al soltar, volvemos a poner el objeto en la escena principal
    // conservando su posición/rotación mundial actual
    scene.attach(obj);
    obj.userData.grabbedBy = null;
    obj.scale.copy(obj.userData.originalScale);
    grabbedByController.delete(controller);
  }
}

function animate() {
  renderer.setAnimationLoop(render);
}

function render() {
  const delta = clock.getDelta();
  handleLocomotion(delta);
  renderer.render(scene, camera);
}
</script>

</body>
</html>
